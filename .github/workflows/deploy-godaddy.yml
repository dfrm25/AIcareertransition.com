# Auto-deploy to GoDaddy on every push to main
# Trigger: commit from Cursor → push to GitHub → this runs and uploads via FTP
name: Deploy to GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GoDaddy (FTP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            .git
            .gitignore
            .github
            .cpanel.yml
            .DS_Store
            *.md
            test_videos.py
            video_source_mapping.txt
